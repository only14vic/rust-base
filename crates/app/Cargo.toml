[package]
name = "app"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[lib]
path = "src/lib.rs"
name = "app"
crate-type = ["lib"]

[[bin]]
path = "src/main.rs"
name = "app"

[features]
default = ["std"]
std = ["app-base/std", "app-macros/std"]

[dependencies]
app-base = { workspace = true }
app-async = { workspace = true, features = ["db"] }
app-macros = { workspace = true }
tokio = { workspace = true }
actix = { workspace = true }
actix-web = { workspace = true }
log = { workspace = true }
sqlx = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
dashmap = { workspace = true }

[dev-dependencies]
app-testing = { workspace = true }
